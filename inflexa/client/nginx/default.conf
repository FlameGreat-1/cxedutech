server {
    listen 80;
    server_name localhost;

    # Serve static React files
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # =========================================================================
    # UNCOMMENT THE BLOCKS BELOW WHEN DEPLOYING TO HOSTINGER VPS (Docker Compose)
    # These proxy /api and /uploads requests to the Node backend container.
    # On Railway, these are NOT needed because the React app calls the backend
    # directly via the VITE_API_URL environment variable.
    # =========================================================================

    # # Proxy /api requests to the Node backend
    # location /api/ {
    #     proxy_pass http://server:5000/api/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection 'upgrade';
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }

    # # Proxy /uploads requests to the Node backend
    # location /uploads/ {
    #     proxy_pass http://server:5000/uploads/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }

    # Error pages
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
