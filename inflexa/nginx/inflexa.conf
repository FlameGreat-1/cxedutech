# ============================================================================
# Inflexa - Host Nginx Configuration (SSL Termination + Reverse Proxy)
# ============================================================================
# This runs on the VPS host (NOT inside Docker).
# It terminates SSL and forwards traffic to the Docker containers.
#
# Domains handled:
#   - inflexatechnologies.com       (primary)
#   - www.inflexatechnologies.com   → redirects to inflexatechnologies.com
#   - inflexatechnologies.co.uk     → redirects to inflexatechnologies.com
#   - www.inflexatechnologies.co.uk → redirects to inflexatechnologies.com
# ============================================================================

# Rate limiting
limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;

# -----------------------------------------------------------------------
# HTTP → HTTPS redirect (all domains)
# -----------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name inflexatechnologies.com
                www.inflexatechnologies.com
                inflexatechnologies.co.uk
                www.inflexatechnologies.co.uk;

    # Allow ACME challenge for Certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://inflexatechnologies.com$request_uri;
    }
}

# -----------------------------------------------------------------------
# Redirect www.inflexatechnologies.com → inflexatechnologies.com (HTTPS)
# -----------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.inflexatechnologies.com;

    ssl_certificate     /etc/letsencrypt/live/inflexatechnologies.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/inflexatechnologies.com/privkey.pem;

    return 301 https://inflexatechnologies.com$request_uri;
}

# -----------------------------------------------------------------------
# Redirect inflexatechnologies.co.uk → inflexatechnologies.com (HTTPS)
# -----------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name inflexatechnologies.co.uk www.inflexatechnologies.co.uk;

    ssl_certificate     /etc/letsencrypt/live/inflexatechnologies.co.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/inflexatechnologies.co.uk/privkey.pem;

    return 301 https://inflexatechnologies.com$request_uri;
}

# -----------------------------------------------------------------------
# Primary HTTPS server — inflexatechnologies.com
# -----------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name inflexatechnologies.com;

    # SSL certificates (managed by Certbot / Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/inflexatechnologies.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/inflexatechnologies.com/privkey.pem;

    # SSL hardening (Mozilla Modern profile)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 1.1.1.1 valid=300s;
    resolver_timeout 5s;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    # Max upload size (product images)
    client_max_body_size 10m;

    # -------------------------------------------------------------------
    # API requests → Node.js backend container (port 5000)
    # -------------------------------------------------------------------
    location /api/ {
        limit_req zone=api burst=50 nodelay;

        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # -------------------------------------------------------------------
    # Uploaded files → Node.js backend container
    # -------------------------------------------------------------------
    location /uploads/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cache static uploads
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # -------------------------------------------------------------------
    # Everything else → React SPA (client container on port 3000)
    # -------------------------------------------------------------------
    location / {
        limit_req zone=general burst=100 nodelay;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Cache static assets served by the client container
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
            proxy_pass http://127.0.0.1:3000;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }
}
